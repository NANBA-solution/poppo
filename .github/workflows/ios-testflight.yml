# ぽっぽ（poppo）— macOS 26 + Xcode 26 で prebuild → Archive → TestFlight
# ローカル Archive 不要。Actions → Run workflow で手動実行のみ。
#
# 初回: ci/GITHUB_SETUP.md — GitHub Secrets 4 つ（Admin API キー必須）

name: iOS TestFlight Upload

on:
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      CI_RELEASE: "1"
      NODE_VERSION: "20"
      BUNDLE_ID: app.poppo.mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Expo prebuild (iOS, production)
        run: npx expo prebuild --platform ios --no-install

      - name: CocoaPods install
        run: |
          cd ios
          LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8 pod install

      - name: Patch fmt for Xcode 26
        run: |
          FMT_BASE="ios/Pods/fmt/include/fmt/base.h"
          test -f "$FMT_BASE" || (echo "fmt base.h not found" && exit 1)
          ruby -e "
            path = 'ios/Pods/fmt/include/fmt/base.h'
            marker = 'Xcode 26 workaround'
            content = File.read(path)
            exit if content.include?(marker)
            patched = content.gsub(
              /(#elif defined\(__cpp_consteval\)\n#  define FMT_USE_CONSTEVAL) 1/,
              \"\\1 0 // #{marker}\"
            )
            abort 'fmt patch pattern not found' if patched == content
            File.chmod(0644, path)
            File.write(path, patched)
            puts 'Patched fmt for Xcode 26'
          "

      - name: Resolve Xcode workspace
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          test -n "$WORKSPACE" || (echo "xcworkspace が見つかりません" && ls -la ios && exit 1)
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          echo "PROJECT_WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild -list -workspace "$WORKSPACE" | head -20

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks | grep -E "iphoneos|SDK"

      - name: Validate and normalize secrets
        env:
          ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r"' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          ISSUER="$(trim "$ISSUER")"
          KEY_ID="$(trim "$KEY_ID")"
          TEAM="$(trim "$TEAM")"
          test -n "$ISSUER" || (echo "APPSTORE_ISSUER_ID が未設定です" && exit 1)
          test -n "$KEY_ID" || (echo "APPSTORE_API_KEY_ID が未設定です" && exit 1)
          test -n "$API_KEY" || (echo "APPSTORE_API_PRIVATE_KEY が未設定です" && exit 1)
          test -n "$TEAM" || (echo "DEVELOPMENT_TEAM が未設定です" && exit 1)
          echo "APPSTORE_ISSUER_ID_CLEAN=$ISSUER" >> "$GITHUB_ENV"
          echo "APPSTORE_API_KEY_ID_CLEAN=$KEY_ID" >> "$GITHUB_ENV"
          echo "DEVELOPMENT_TEAM_CLEAN=$TEAM" >> "$GITHUB_ENV"

      - name: Install App Store Connect API key
        env:
          API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID_CLEAN}.p8"
          CLEAN="$(printf '%s' "$API_KEY" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [[ "$CLEAN" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "$CLEAN" > "$KEY_FILE"
            echo "API key (PEM) を配置しました"
          elif printf '%s' "$CLEAN" | base64 -d > "$KEY_FILE" 2>/dev/null && openssl pkey -in "$KEY_FILE" -noout 2>/dev/null; then
            echo "API key (base64) を配置しました"
          else
            echo "APPSTORE_API_PRIVATE_KEY が不正です。PEM 全文か base64 1行を設定してください"
            exit 1
          fi
          openssl pkey -in "$KEY_FILE" -noout
          mkdir -p "$HOME/private_keys"
          cp "$KEY_FILE" "$HOME/private_keys/AuthKey_${APPSTORE_API_KEY_ID_CLEAN}.p8"
          echo "AUTH_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/poppo.xcarchive"
          set +e
          xcodebuild archive \
            -workspace "$PROJECT_WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_CLEAN" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID_CLEAN" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID_CLEAN" \
            2>&1 | tee /tmp/xcodebuild-archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            if rg -q "maximum number of certificates" /tmp/xcodebuild-archive.log; then
              echo ""
              echo "::error::Apple Developer の証明書が上限です。"
              echo "https://developer.apple.com/account/resources/certificates/list"
              echo "古い Created via API 証明書を Revoke してから Run workflow を再実行してください。"
              echo "手順: ci/GITHUB_SETUP.md の §8"
            fi
            exit "$ARCHIVE_STATUS"
          fi
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          EXPORT_DIR="$RUNNER_TEMP/export"
          MAX_ATTEMPTS=3
          EXPORT_PLISTS=(ci/ExportOptions.plist ci/ExportOptions-appstore.plist)

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            PLIST="${EXPORT_PLISTS[$((attempt > 1 ? 1 : 0))]}"
            echo "Export attempt ${attempt}/${MAX_ATTEMPTS} (plist: ${PLIST})"
            rm -rf "$EXPORT_DIR"
            mkdir -p "$EXPORT_DIR"

            set +e
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath "$EXPORT_DIR" \
              -exportOptionsPlist "$PLIST" \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$AUTH_KEY_PATH" \
              -authenticationKeyID "$APPSTORE_API_KEY_ID_CLEAN" \
              -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID_CLEAN"
            STATUS=$?
            set -e

            if [ "$STATUS" -eq 0 ]; then
              IPA="$(find "$EXPORT_DIR" -name '*.ipa' | head -1)"
              if [ -n "$IPA" ]; then
                echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
                exit 0
              fi
            fi

            echo "Export failed (exit ${STATUS})."
            security find-identity -v -p codesigning | head -10 || true
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting 45s before retry..."
              sleep 45
            fi
          done

          echo "Export failed after ${MAX_ATTEMPTS} attempts."
          echo "よくある原因: API キーが Admin でない / Apple 側の一時障害 → 数分後に Run workflow を再実行"
          exit 70

      - name: Upload to TestFlight
        run: |
          set +e
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_API_KEY_ID_CLEAN" \
            --apiIssuer "$APPSTORE_ISSUER_ID_CLEAN"
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "Upload 失敗。初回は App Store Connect にアプリ登録が必要です:"
            echo "  Bundle ID: ${BUNDLE_ID}"
            echo "  手順: ci/GITHUB_SETUP.md の「初回アップロード前」"
            exit "$STATUS"
          fi

      - name: Summary
        run: |
          VERSION="$(node -p "require('./app.json').expo.version")"
          echo "アップロード完了。App Store Connect → TestFlight で Processing を確認してください。"
          echo "Build: ${VERSION} (${{ github.run_number }})"
          echo "Bundle ID: ${BUNDLE_ID}"
